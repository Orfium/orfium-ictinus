version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    cooldown:
      default-days: 2
